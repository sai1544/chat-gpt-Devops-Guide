name: Terraform CI

on:
  push:
    paths:
      - 'terraform-azure/**'

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform-azure

      - name: Terraform Format Check
        run: terraform fmt -check
        working-directory: ./terraform-azure

      - name: Terraform Plan
        run: terraform plan
        working-directory: ./terraform-azure


---

